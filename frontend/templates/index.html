<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAMR — AMRFinderPlus Web Interface</title>
  <link rel="stylesheet" href="static/css/style.css" />
  <link rel="icon" href="static/favicon.ico" type="image/x-icon" />
</head>

<body>
  <h1>Upload your files to run <a href="https://github.com/ncbi/amr/wiki">AMRFinderPlus</a></h1>
  <span style="color: red;">This is a personal experimental side-project and may fail.</span><span>This software does
    not reflect the priorities or opinions of my employer, and use of the results is at your own risk.</span>
  <p></p>
  <pre>AMRFinderPlus <a href="https://github.com/ncbi/amr/releases/tag/amrfinder_v{{ software_version }}"></a>{{ software_version }}</a> database version {{ database_version }}</pre>
  <form id="upload-form" action="/analyze" method="POST" enctype="multipart/form-data">
    <label for="job_name"><a href="/docs#job-name">Job name</a> (optional):</label>
    <input type="text" name="job_name" id="job_name" maxlength="100"> <br>
    <label for="file">Select an assembled <a href="/docs#nucleotide-file">nucleotide file</a>:</label>
    <input type="file" name="nuc_file"> <br>
    <label for="file">Select a <a href="/docs#protein-file">protein file</a>:</label>
    <input type="file" name="prot_file"> <br>
    <label for="gff_file">Select a <a href="/docs#gff-file">GFF file</a>:</label>
    <input type="file" name="gff_file" id="gff_file">
    <label for="annotation_format" style="margin-left: 15px;"><a href="/docs#annotation-format">Annotation
        format</a>:</label>
    <select id="annotation_format" name="annotation_format">
      <option value="bakta">bakta</option>
      <option value="genbank">genbank</option>
      <option value="microscope">microscope</option>
      <option value="patric">patric</option>
      <option value="pgap">pgap</option>
      <option value="prodigal">prodigal</option>
      <option value="prokka">prokka</option>
      <option value="pseudomonasdb">pseudomonasdb</option>
      <option value="rast">rast</option>
      <option value="standard" selected>standard</option>
    </select> <br>
    <label for="organism"><a href="/docs#organism-group">Organism group</a> (optional):</label>

    <select id="organism" name="organism">
      <option value="">None</option>
      {{ organism_select | safe }}
    </select> <br />
    <!-- label for="parameters">Parameters (optional):</label> <br> 
      <input type="text" name="parameters" id="parameters"> <br><br>-->
    <button type="submit">Run AMRFinderPlus</button>
    <button type="reset">Reset</button>
  </form>
  <div id="status-msg"></div>

  <script>
    const form = document.getElementById('upload-form');
    const statusMsg = document.getElementById('status-msg');

    function validateForm() {
      const nucFile = form.elements['nuc_file'].files[0];
      const protFile = form.elements['prot_file'].files[0];
      const gffFile = form.elements['gff_file'].files[0];

      const MAX_SIZE = 10 * 1024 * 1024; // 10 MB
      if ((nucFile && nucFile.size > MAX_SIZE) ||
        (protFile && protFile.size > MAX_SIZE) ||
        (gffFile && gffFile.size > MAX_SIZE)) {
        statusMsg.innerHTML = '<p class="error">File size exceeds the 10MB limit. Please upload smaller files.</p>';
        return false;
      }

      if (nucFile && !protFile && !gffFile) {
        return true; // Only nuc_file provided
      } else if (protFile && !nucFile && !gffFile) {
        return true; // Only prot_file provided
      } else if (nucFile && protFile && gffFile) {
        return true; // All three files provided
      } else {
        statusMsg.innerHTML = '<p class="error">Please upload either only a nucleotide file, only a protein file, or all three files (nucleotide, protein, and GFF).</p>';
        return false; // Invalid file combination
      }
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      statusMsg.innerHTML = '';

      if (!validateForm()) {
        return;
      }

      const nucFile = form.elements['nuc_file'].files[0];
      const protFile = form.elements['prot_file'].files[0];
      const gffFile = form.elements['gff_file'].files[0];

      const formData = new FormData();
      if (nucFile) formData.append('nuc_file', nucFile);
      if (protFile) formData.append('prot_file', protFile);
      if (gffFile) formData.append('gff_file', gffFile);
      formData.append('job_name', form.elements['job_name'].value || '');
      formData.append('annotation_format', form.elements['annotation_format'].value || 'standard');
      formData.append('organism', form.elements['organism'].value);

      // Disable the submit button and show upload progress
      const submitButton = form.querySelector('button[type="submit"]');
      submitButton.disabled = true;
      statusMsg.innerHTML = '<p>Uploading files…</p>';

      fetch('/analyze', {
        method: 'POST',
        body: formData
      })
        .then(async response => {
          let data;
          try {
            data = await response.json();
          } catch (e) {
            const text = await response.text();
            throw new Error(`Server returned non-JSON response: ${text}`);
          }
          if (!response.ok) {
            throw new Error(data.error || 'Unknown Server Error');
          }
          return data;
        })
        .then(data => {
          // Redirect to the dedicated results page
          window.location.href = data.results_url || `/results/${data.user_id}`;
        })
        .catch(error => {
          submitButton.disabled = false;
          console.error('Error:', error);
          statusMsg.innerHTML = `<p class="error">ERROR: ${error.message || error.toString()}</p>`;
        });
    });
  </script>

</body>

</html>
