<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="static/css/style.css" />
  <link rel="icon" href="static/favicon.ico" type="image/x-icon" />
</head>

<body>
  <h1>Upload your files to run <a href="https://github.com/ncbi/amr/wiki">AMRFinderPlus</a></h1>
  This is designed to run a bacterial genome at a time. Larger submissions will probably fail. <br />
  <span style="color: red;">This is experimental and may fail.</span>
  <p></p>
  <pre>software={{ software_version }} | db={{ database_version }}</pre>
  <form id="upload-form" action="/analyze" method="POST" enctype="multipart/form-data">
    <label for="file">Select an assembled nucleotide file:</label>
    <input type="file" name="nuc_file"> <br>
    <label for="file">Select an assembled protein file:</label>
    <input type="file" name="prot_file"> <br>
    <label for="file">Select a GFF file:</label>
    <input type="file" name="gff_file"> <br>
    <label for="organism">Organism group (optional):</label>

    <select id="organism" name="organism">
      <option value="">None</option>
      {{ organism_select | safe }}
    </select> <br />
    <!-- label for="parameters">Parameters (optional):</label> <br> 
      <input type="text" name="parameters" id="parameters"> <br><br>-->
    <button type="submit">Run AMRFinderPlus</button>
    <button type="reset">Reset</button>
  </form>
  <div id="results">
  </div>
  <div id="poll-results"></div>

  <script>
    const form = document.getElementById('upload-form');
    const resultsDiv = document.getElementById('results');
    let timerInterval;
    let elapsedTime = 0;

    function pollForResults(userId) {
      const pollResultsDiv = document.getElementById('poll-results');
      let pollInterval = setInterval(() => {
        fetch(`/get-results/${userId}`)
          .then(response => {
            if (response.status === 204) {
              // No results yet — keep polling
              pollResultsDiv.innerHTML = `<p>No result yet. Still Polling...</p>`;
              return null;
            }
            return response.json();
          })
          .then(data => {
            if (!data) return; // 204 case, skip processing

            if (data.error) {
              // Job failed — stop timer and show error
              clearInterval(timerInterval);
              clearInterval(pollInterval);
              let minutes = Math.floor(elapsedTime / 60000);
              let seconds = Math.floor((elapsedTime % 60000) / 1000);
              let formattedTime = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
              resultsDiv.innerHTML = `<p>Elapsed time: ${formattedTime}</p><p>ERROR: ${data.error}</p>`;
              return;
            }

            if (data.result) {
              // Stop the timer now that we have final results
              clearInterval(timerInterval);
              let minutes = Math.floor(elapsedTime / 60000);
              let seconds = Math.floor((elapsedTime % 60000) / 1000);
              let formattedTime = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
              // Display the result content with final elapsed time
              resultsDiv.innerHTML = `<p>Elapsed time: ${formattedTime}</p>${data.result}`;
              clearInterval(pollInterval);
              // Add download button
              const downloadButton = document.createElement('button');
              downloadButton.textContent = 'Download Results';
              downloadButton.addEventListener('click', () => {
                downloadResults(userId); // Call downloadResults with userId
              });
              resultsDiv.appendChild(downloadButton);
            }
          })
          .catch(error => {
            console.error('Error polling for results:', error);
            // Don't stop polling on transient network errors — keep trying
          });

      }, 10000); // Poll every 10 seconds
    }
    function validateForm() {
      const nucFile = form.elements['nuc_file'].files[0];
      const protFile = form.elements['prot_file'].files[0];
      const gffFile = form.elements['gff_file'].files[0];

      const MAX_SIZE = 10 * 1024 * 1024; // 10 MB
      if ((nucFile && nucFile.size > MAX_SIZE) ||
        (protFile && protFile.size > MAX_SIZE) ||
        (gffFile && gffFile.size > MAX_SIZE)) {
        resultsDiv.innerHTML = '<p class="error">File size exceeds the 10MB limit. Please upload smaller files.</p>';
        return false;
      }

      if (nucFile && !protFile && !gffFile) {
        return true; // Only nuc_file provided
      } else if (protFile && !nucFile && !gffFile) {
        return true; // Only prot_file provided
      } else if (nucFile && protFile && gffFile) {
        return true; // All three files provided
      } else {
        resultsDiv.innerHTML = '<p class="error">Please upload either only a nucleotide file, only a protein file, or all three files (nucleotide, protein, and GFF).</p>';
        return false; // Invalid file combination
      }
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      resultsDiv.innerHTML = ''; // Clear previous results

      // Validate the form before building FormData
      if (!validateForm()) {
        return; // Prevent form submission if validation fails
      }

      const nucFile = form.elements['nuc_file'].files[0];
      const protFile = form.elements['prot_file'].files[0];
      const gffFile = form.elements['gff_file'].files[0];

      const formData = new FormData();
      if (nucFile) {
        formData.append('nuc_file', nucFile);
      }
      if (protFile) {
        formData.append('prot_file', protFile);
      }
      if (gffFile) {
        formData.append('gff_file', gffFile);
      }
      formData.append('organism', form.elements['organism'].value);
      // Start the timer
      elapsedTime = 0;
      timerInterval = setInterval(() => {
        elapsedTime += 1000;
        let minutes = Math.floor(elapsedTime / 60000);
        let seconds = Math.floor((elapsedTime % 60000) / 1000);
        let formattedTime = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        resultsDiv.innerHTML = `<p>Analyzing with AMRFinderPlus it may take 5-10 minutes for a whole genome... <br />Elapsed time: ${formattedTime}</p>`;
      }, 1000);

      function downloadResults(userId) {
        fetch('/output/' + userId)
          .then(response => response.blob())
          .then(blob => {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'amr_results.txt';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
          })
          .catch(error => console.error('Error downloading results:', error));
      }

      fetch('/analyze', {
        method: 'POST',
        body: formData
      })
        .then(async response => {
          // Don't stop the timer here - keep it running during polling
          let data;
          try {
            data = await response.json();
          } catch (e) {
            const text = await response.text();
            throw new Error(`Server returned non-JSON response: ${text}`);
          }

          if (!response.ok) {
            throw new Error(data.error || 'Unknown Server Error');
          }
          return data;
        })
        .then(data => {
          if (data.result && data.result.startsWith('error:')) {
            // Stop the timer on error
            clearInterval(timerInterval);
            let minutes = Math.floor(elapsedTime / 60000);
            let seconds = Math.floor((elapsedTime % 60000) / 1000);
            let formattedTime = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            const errorContent = data.result.substring(7); // Remove "error: " prefix
            resultsDiv.innerHTML = `<p>Elapsed time: ${formattedTime}</p><p>ERROR:<br /><pre>\n${errorContent}\n</pre></p>`;
          } else if (data.result) {
            // Keep timer running - it will be stopped when pollForResults gets the final result
            pollForResults(data.user_id);
          }
        })
        .catch(error => {
          // Stop the timer
          clearInterval(timerInterval);
          console.error('Error:', error);
          // Display the full error message in a <pre> tag
          resultsDiv.innerHTML = `<p>ERROR:</p><pre>${error.message || error.toString()}</pre>`;

          // Add a button to copy the error to the clipboard
          const copyButton = document.createElement('button');
          copyButton.textContent = 'Copy Error';
          copyButton.addEventListener('click', () => {
            navigator.clipboard.writeText(JSON.stringify(error, null, 2))
              .then(() => alert('Error copied to clipboard!'))
              .catch(err => console.error('Failed to copy error: ', err));
          });
          resultsDiv.appendChild(copyButton);
        });
    });
  </script>

</body>

</html>
